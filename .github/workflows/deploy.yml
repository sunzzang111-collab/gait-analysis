name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/gait-analysis-mvp]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Per-branch group so a build-only run on a non-default branch never cancels
  # the default branch's in-flight deploy.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    # The github-pages environment only accepts deployments from the default
    # branch, so only deploy when this run is on it. Non-default branches still
    # build (a safety check) but skip deploy instead of failing.
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
